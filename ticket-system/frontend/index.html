<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>工单管理系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: #f5f5f5;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background-color: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            padding: 24px;
        }
        h1 {
            color: #333;
            margin-bottom: 20px;
            font-size: 24px;
        }
        .header {
            display: flex;
            justify-content: flex-start;
            align-items: center;
            margin-bottom: 20px;
            gap: 20px;
        }
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }
        .btn-primary {
            background-color: #1890ff;
            color: white;
        }
        .btn-primary:hover {
            background-color: #40a9ff;
        }
        .btn-danger {
            background-color: #ff4d4f;
            color: white;
        }
        .btn-danger:hover {
            background-color: #ff7875;
        }
        .btn-warning {
            background-color: #faad14;
            color: white;
        }
        .btn-warning:hover {
            background-color: #ffc53d;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #e8e8e8;
        }
        th {
            background-color: #fafafa;
            font-weight: 600;
            color: #333;
        }
        tr:hover {
            background-color: #f5f5f5;
        }
        .status {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
        }
        .status-pending {
            background-color: #fff7e6;
            color: #fa8c16;
            border: 1px solid #ffd591;
        }
        .status-processing {
            background-color: #e6f7ff;
            color: #1890ff;
            border: 1px solid #91d5ff;
        }
        .status-completed {
            background-color: #f6ffed;
            color: #52c41a;
            border: 1px solid #b7eb8f;
        }
        .actions {
            display: flex;
            gap: 8px;
        }
        .btn-small {
            padding: 4px 12px;
            font-size: 12px;
        }
        .empty-state {
            text-align: center;
            padding: 40px;
            color: #999;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal.active {
            display: flex;
        }
        .modal-content {
            background-color: white;
            padding: 24px;
            border-radius: 8px;
            width: 400px;
        }
        .modal-header {
            margin-bottom: 16px;
        }
        .modal-body {
            margin-bottom: 24px;
        }
        .modal-footer {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
        }
        .btn-secondary {
            background-color: #f0f0f0;
            color: #333;
        }
        .btn-secondary:hover {
            background-color: #d9d9d9;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>工单列表</h1>
            <button class="btn btn-primary" onclick="goToAdd()">+ 添加工单</button>
        </div>
        <table id="ticketTable">
            <thead>
                <tr>
                    <th>工单编号</th>
                    <th>工单主题</th>
                    <th>类别</th>
                    <th>状态</th>
                    <th>创建日期</th>
                    <th>创建人</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody id="ticketList">
                <!-- 动态生成 -->
            </tbody>
        </table>
        <div id="emptyState" class="empty-state" style="display: none;">
            暂无工单数据
        </div>
    </div>

    <!-- 删除确认弹窗 -->
    <div id="deleteModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>确认删除</h3>
            </div>
            <div class="modal-body">
                确定要删除该工单吗？此操作不可恢复。
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal()">取消</button>
                <button class="btn btn-danger" onclick="confirmDelete()">删除</button>
            </div>
        </div>
    </div>

    <script>
        const API_BASE_URL = 'http://localhost:8000/api';
        let deleteId = null;

        // 获取工单列表
        async function loadTickets() {
            try {
                const response = await fetch(`${API_BASE_URL}/tickets`);
                const result = await response.json();
                
                if (result.success) {
                    renderTickets(result.data);
                } else {
                    showEmptyState();
                }
            } catch (error) {
                console.error('加载工单失败:', error);
                showEmptyState();
            }
        }

        // 渲染工单列表
        function renderTickets(tickets) {
            const tbody = document.getElementById('ticketList');
            const emptyState = document.getElementById('emptyState');
            
            if (!tickets || tickets.length === 0) {
                showEmptyState();
                return;
            }

            emptyState.style.display = 'none';
            tbody.innerHTML = tickets.map(ticket => `
                <tr>
                    <td>${escapeHtml(ticket.ticket_no)}</td>
                    <td>${escapeHtml(ticket.subject)}</td>
                    <td>${escapeHtml(ticket.category)}</td>
                    <td><span class="status ${getStatusClass(ticket.status)}">${escapeHtml(ticket.status)}</span></td>
                    <td>${formatDate(ticket.created_at)}</td>
                    <td>${escapeHtml(ticket.creator)}</td>
                    <td class="actions">
                        <button class="btn btn-warning btn-small" onclick="editTicket(${ticket.id})">编辑</button>
                        <button class="btn btn-danger btn-small" onclick="showDeleteModal(${ticket.id})">删除</button>
                    </td>
                </tr>
            `).join('');
        }

        // 显示空状态
        function showEmptyState() {
            document.getElementById('ticketList').innerHTML = '';
            document.getElementById('emptyState').style.display = 'block';
        }

        // 获取状态样式类
        function getStatusClass(status) {
            const statusMap = {
                '待处理': 'status-pending',
                '处理中': 'status-processing',
                '已完成': 'status-completed'
            };
            return statusMap[status] || 'status-pending';
        }

        // 格式化日期
        function formatDate(dateStr) {
            if (!dateStr) return '-';
            const date = new Date(dateStr);
            return date.toLocaleDateString('zh-CN');
        }

        // 转义HTML
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 跳转到添加页面
        function goToAdd() {
            window.location.href = '/add';
        }

        // 编辑工单
        function editTicket(id) {
            window.location.href = `/edit?id=${id}`;
        }

        // 显示删除确认弹窗
        function showDeleteModal(id) {
            deleteId = id;
            document.getElementById('deleteModal').classList.add('active');
        }

        // 关闭弹窗
        function closeModal() {
            deleteId = null;
            document.getElementById('deleteModal').classList.remove('active');
        }

        // 确认删除
        async function confirmDelete() {
            if (!deleteId) return;
            
            try {
                const response = await fetch(`${API_BASE_URL}/tickets/${deleteId}`, {
                    method: 'DELETE'
                });
                
                const result = await response.json();
                
                if (result.success) {
                    closeModal();
                    loadTickets();
                } else {
                    alert(result.message || '删除失败');
                }
            } catch (error) {
                console.error('删除工单失败:', error);
                alert('删除失败，请重试');
            }
        }

        // 页面加载时获取数据
        document.addEventListener('DOMContentLoaded', loadTickets);
    </script>
</body>
</html>
