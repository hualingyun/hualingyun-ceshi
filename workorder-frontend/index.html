<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>工单管理系统</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="app">
        <header class="header">
            <h1>工单管理系统</h1>
        </header>
        
        <main class="main-content">
            <div id="list-page" class="page active">
                <div class="toolbar">
                    <button id="add-btn" class="btn btn-primary">添加工单</button>
                </div>
                
                <div class="table-container">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>工单编号</th>
                                <th>工单主题</th>
                                <th>类别</th>
                                <th>工单状态</th>
                                <th>创建日期</th>
                                <th>创建人</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="work-order-list">
                        </tbody>
                    </table>
                </div>
            </div>
            
            <div id="form-page" class="page">
                <div class="form-container">
                    <h2 id="form-title">添加工单</h2>
                    <form id="work-order-form">
                        <input type="hidden" id="work-order-id">
                        
                        <div class="form-group">
                            <label for="order_no">工单编号 <span class="required">*</span></label>
                            <input type="text" id="order_no" name="order_no" placeholder="以字母开头，6-20位，须同时包含大小写字母和数字">
                            <span class="error-msg" id="order_no_error"></span>
                        </div>
                        
                        <div class="form-group">
                            <label for="subject">工单主题 <span class="required">*</span></label>
                            <input type="text" id="subject" name="subject" placeholder="请输入工单主题">
                            <span class="error-msg" id="subject_error"></span>
                        </div>
                        
                        <div class="form-group">
                            <label for="category">工单类别 <span class="required">*</span></label>
                            <select id="category" name="category">
                                <option value="">请选择类别</option>
                                <option value="日常工单">日常工单</option>
                                <option value="事件工单">事件工单</option>
                            </select>
                            <span class="error-msg" id="category_error"></span>
                        </div>
                        
                        <div class="form-group">
                            <label for="description">问题描述</label>
                            <textarea id="description" name="description" rows="4" placeholder="请输入问题描述"></textarea>
                        </div>
                        
                        <div class="form-row">
                            <div class="form-group">
                                <label for="planned_start_time">计划开始时间 <span class="required">*</span></label>
                                <input type="datetime-local" id="planned_start_time" name="planned_start_time">
                                <span class="error-msg" id="planned_start_time_error"></span>
                            </div>
                            
                            <div class="form-group">
                                <label for="planned_end_time">计划结束时间 <span class="required">*</span></label>
                                <input type="datetime-local" id="planned_end_time" name="planned_end_time">
                                <span class="error-msg" id="planned_end_time_error"></span>
                            </div>
                        </div>
                        
                        <div class="form-group">
                            <label for="executor">执行人 <span class="required">*</span></label>
                            <input type="text" id="executor" name="executor" placeholder="请输入执行人">
                            <span class="error-msg" id="executor_error"></span>
                        </div>
                        
                        <div class="form-actions">
                            <button type="submit" class="btn btn-primary" id="submit-btn">保存</button>
                            <button type="button" class="btn btn-secondary" id="cancel-btn">取消</button>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>
    
    <div id="modal" class="modal">
        <div class="modal-content">
            <p id="modal-message"></p>
            <div class="modal-actions">
                <button class="btn btn-primary" id="modal-confirm">确认</button>
                <button class="btn btn-secondary" id="modal-cancel">取消</button>
            </div>
        </div>
    </div>
    
    <script src="js/app.js"></script>
</body>
</html>
