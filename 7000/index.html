<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数据可视化仪表板</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <header class="dashboard-header">
        <div class="header-left">
            <h1>数据可视化仪表板</h1>
            <div class="theme-switch">
                <label class="switch">
                    <input type="checkbox" id="themeToggle">
                    <span class="slider"></span>
                </label>
                <span id="themeLabel">深色模式</span>
            </div>
        </div>
        <div class="header-right">
            <button id="addChartBtn" class="btn btn-primary">添加图表</button>
            <button id="exportPngBtn" class="btn btn-secondary">导出PNG</button>
            <button id="exportCsvBtn" class="btn btn-secondary">导出CSV</button>
        </div>
    </header>

    <div class="chart-config-panel" id="chartConfigPanel">
        <div class="panel-header">
            <h3>图表配置</h3>
            <button id="closePanelBtn" class="close-btn">&times;</button>
        </div>
        <div class="panel-body">
            <div class="form-group">
                <label for="chartTitle">图表标题</label>
                <input type="text" id="chartTitle" placeholder="请输入图表标题">
            </div>
            <div class="form-group">
                <label for="chartType">图表类型</label>
                <select id="chartType">
                    <option value="line">折线图</option>
                    <option value="bar">柱状图</option>
                    <option value="pie">饼图</option>
                    <option value="radar">雷达图</option>
                </select>
            </div>
            <div class="form-group">
                <label for="dataInterval">数据更新间隔 (毫秒)</label>
                <input type="number" id="dataInterval" value="2000" min="500" max="10000">
            </div>
            <div class="form-group">
                <label for="chartColor">主色调</label>
                <input type="color" id="chartColor" value="#3b82f6">
            </div>
            <div class="form-group">
                <button id="applyConfigBtn" class="btn btn-primary w-full">应用配置</button>
                <button id="deleteChartBtn" class="btn btn-danger w-full mt-1">删除图表</button>
            </div>
        </div>
    </div>

    <main class="dashboard-container" id="dashboardContainer">
        <!-- 图表将动态添加到这里 -->
    </main>

    <script src="dashboard.js"></script>
</body>
</html>
