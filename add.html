<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>添加工单</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background-color: #f5f7fa;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background-color: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 2px 12px 0 rgba(0, 0, 0, 0.1);
        }

        h1 {
            color: #333;
            font-size: 24px;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #666;
            font-weight: 500;
        }

        input[type="text"], input[type="datetime-local"], select, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #dcdfe6;
            border-radius: 4px;
            font-size: 14px;
            color: #606266;
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        .form-buttons {
            display: flex;
            gap: 10px;
        }

        .submit-btn, .back-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            text-decoration: none;
            display: inline-block;
        }

        .submit-btn {
            background-color: #409eff;
            color: white;
        }

        .submit-btn:hover {
            background-color: #66b1ff;
        }

        .back-btn {
            background-color: #f5f7fa;
            color: #606266;
        }

        .back-btn:hover {
            background-color: #e4e7ed;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>添加工单</h1>
        <form id="addForm">
            <div class="form-group">
                <label for="title">工单主题</label>
                <input type="text" id="title" name="title" required>
            </div>

            <div class="form-group">
                <label for="category">类别</label>
                <select id="category" name="category" required>
                    <option value="">请选择类别</option>
                    <option value="日常工单">日常工单</option>
                    <option value="事件工单">事件工单</option>
                    <option value="问题工单">问题工单</option>
                    <option value="变更工单">变更工单</option>
                </select>
            </div>

            <div class="form-group">
                <label for="description">问题描述</label>
                <textarea id="description" name="description" required></textarea>
            </div>

            <div class="form-group">
                <label for="startTime">计划开始时间</label>
                <input type="datetime-local" id="startTime" name="startTime" required>
            </div>

            <div class="form-group">
                <label for="executor">执行人</label>
                <input type="text" id="executor" name="executor" required>
            </div>

            <div class="form-group">
                <label for="endTime">计划结束时间</label>
                <input type="datetime-local" id="endTime" name="endTime" required>
            </div>

            <div class="form-buttons">
                <button type="submit" class="submit-btn">保存</button>
                <a href="index.html" class="back-btn">返回</a>
            </div>
        </form>
    </div>

    <script>
        document.getElementById('addForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const formData = new FormData(this);
            const data = Object.fromEntries(formData);

            fetch('api/add.php', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify(data),
            })
            .then(response => response.json())
            .then(result => {
                if (result.success) {
                    alert('工单添加成功！');
                    window.location.href = 'index.html';
                } else {
                    alert('添加失败：' + result.message);
                }
            })
            .catch(error => {
                console.error('Error:', error);
                alert('添加失败，请稍后重试');
            });
        });
    </script>
</body>
</html>
