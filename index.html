<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>工单管理系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background-color: #f5f7fa;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        h1 {
            color: #333;
            font-size: 24px;
        }

        .add-btn {
            background-color: #409eff;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            text-decoration: none;
            display: inline-block;
        }

        .add-btn:hover {
            background-color: #66b1ff;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background-color: white;
            box-shadow: 0 2px 12px 0 rgba(0, 0, 0, 0.1);
        }

        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }

        th {
            background-color: #f5f7fa;
            color: #666;
            font-weight: 500;
        }

        tr:hover {
            background-color: #fafafa;
        }

        .action-btn {
            padding: 5px 10px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            margin-right: 5px;
        }

        .edit-btn {
            background-color: #67c23a;
            color: white;
        }

        .edit-btn:hover {
            background-color: #85ce61;
        }

        .status {
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 12px;
            color: white;
        }

        .status-open {
            background-color: #67c23a;
        }

        .status-processing {
            background-color: #e6a23c;
        }

        .status-closed {
            background-color: #f56c6c;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>工单管理系统</h1>
            <a href="add.html" class="add-btn">添加工单</a>
        </div>
        <table>
            <thead>
                <tr>
                    <th>工单编号</th>
                    <th>工单主题</th>
                    <th>类别</th>
                    <th>工单状态</th>
                    <th>创建日期</th>
                    <th>创建人</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody id="ticketList">
                <!-- 工单数据将通过JavaScript动态加载 -->
            </tbody>
        </table>
    </div>

    <script>
        // 加载工单列表
        function loadTicketList() {
            fetch('api/list.php')
                .then(response => response.json())
                .then(data => {
                    const tbody = document.getElementById('ticketList');
                    tbody.innerHTML = '';
                    
                    data.forEach(ticket => {
                        const tr = document.createElement('tr');
                        tr.innerHTML = `
                            <td>${ticket.id}</td>
                            <td>${ticket.title}</td>
                            <td>${ticket.category}</td>
                            <td><span class="status status-${ticket.status}">${ticket.statusText}</span></td>
                            <td>${ticket.createTime}</td>
                            <td>${ticket.creator}</td>
                            <td>
                                <a href="edit.html?id=${ticket.id}" class="action-btn edit-btn">编辑</a>
                            </td>
                        `;
                        tbody.appendChild(tr);
                    });
                })
                .catch(error => console.error('Error:', error));
        }

        // 页面加载时获取工单列表
        window.onload = loadTicketList;
    </script>
</body>
</html>
