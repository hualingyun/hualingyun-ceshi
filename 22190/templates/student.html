<!DOCTYPE html>
<html>
<head>
    <title>学生值班系统</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>欢迎，{{.user.Name}}</h1>
            <div>
                <a href="/handover" class="btn btn-small">交接班</a>
                <a href="/logout" class="btn btn-small btn-secondary">退出登录</a>
            </div>
        </div>
        
        <div class="section">
            <h2>我的排班</h2>
            <table class="data-table">
                <thead>
                    <tr>
                        <th>日期</th>
                        <th>班次</th>
                    </tr>
                </thead>
                <tbody id="scheduleBody">
                    <tr>
                        <td colspan="2">加载中...</td>
                    </tr>
                </tbody>
            </table>
            
            <div class="pagination" id="pagination" style="margin-top: 20px; text-align: center;"></div>
        </div>
    </div>
    
    <script>
        const pageSize = 10;
        let currentPage = 1;
        let allSchedules = [];
        
        function loadSchedules() {
            try {
                allSchedules = JSON.parse({{.schedules}}) || [];
            } catch(e) {
                allSchedules = [];
            }
            allSchedules.sort((a, b) => new Date(a.date) - new Date(b.date));
            renderSchedules();
        }
        
        function renderSchedules() {
            const start = (currentPage - 1) * pageSize;
            const end = start + pageSize;
            const pageData = allSchedules.slice(start, end);
            
            const tbody = document.getElementById('scheduleBody');
            if (pageData.length === 0) {
                tbody.innerHTML = '<tr><td colspan="2">暂无排班</td></tr>';
            } else {
                tbody.innerHTML = pageData.map(s => `
                    <tr>
                        <td>${s.date}</td>
                        <td>${s.shift === 'morning' ? '早班' : '晚班'}</td>
                    </tr>
                `).join('');
            }
            
            renderPagination();
        }
        
        function renderPagination() {
            const totalPages = Math.ceil(allSchedules.length / pageSize);
            const pagination = document.getElementById('pagination');
            
            if (totalPages <= 1) {
                pagination.innerHTML = '';
                return;
            }
            
            let html = '';
            html += `<button class="btn btn-small" onclick="goToPage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>上一页</button>`;
            html += `<span style="margin: 0 15px;">第 ${currentPage} / ${totalPages} 页，共 ${allSchedules.length} 条</span>`;
            html += `<button class="btn btn-small" onclick="goToPage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}>下一页</button>`;
            
            pagination.innerHTML = html;
        }
        
        function goToPage(page) {
            const totalPages = Math.ceil(allSchedules.length / pageSize);
            if (page < 1 || page > totalPages) return;
            currentPage = page;
            renderSchedules();
        }
        
        loadSchedules();
    </script>
</body>
</html>
