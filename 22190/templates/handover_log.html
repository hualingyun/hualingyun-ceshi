<!DOCTYPE html>
<html>
<head>
    <title>交接班日志</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>交接班日志</h1>
            <a href="/admin" class="btn btn-small btn-secondary">返回首页</a>
        </div>
        
        <div class="section">
            <table class="data-table">
                <thead>
                    <tr>
                        <th>日期</th>
                        <th>班次</th>
                        <th>值班人</th>
                        <th>交接班时间</th>
                        <th>备注</th>
                    </tr>
                </thead>
                <tbody>
                    {{range .logs}}
                    <tr>
                        <td>{{.Date}}</td>
                        <td>{{if eq .Shift "morning"}}早班{{else}}晚班{{end}}</td>
                        <td>{{.Name}}</td>
                        <td>{{.HandoverTime.Format "2006-01-02 15:04:05"}}</td>
                        <td>{{.Remark}}</td>
                    </tr>
                    {{else}}
                    <tr>
                        <td colspan="5">暂无交接班记录</td>
                    </tr>
                    {{end}}
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
