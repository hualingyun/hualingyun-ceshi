<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户注册</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            max-width: 400px;
            width: 100%;
        }
        h1 {
            color: #333;
            margin-bottom: 30px;
            text-align: center;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-weight: 500;
        }
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        input:focus {
            outline: none;
            border-color: #667eea;
        }
        .btn {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
        }
        .btn:hover {
            background: #5a6fd8;
        }
        .error {
            color: #e74c3c;
            font-size: 12px;
            margin-top: 5px;
            display: none;
        }
        .success {
            color: #27ae60;
            font-size: 14px;
            text-align: center;
            margin-top: 15px;
            display: none;
        }
        .login-link {
            text-align: center;
            margin-top: 20px;
            color: #666;
        }
        .login-link a {
            color: #667eea;
            text-decoration: none;
        }
        .login-link a:hover {
            text-decoration: underline;
        }
        .hint {
            font-size: 11px;
            color: #999;
            margin-top: 3px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>用户注册</h1>
        <form id="registerForm">
            <div class="form-group">
                <label for="username">用户名</label>
                <input type="text" id="username" name="username" placeholder="请输入用户名">
                <div class="hint">3-10个字符，字母开头，必须同时包含字母、数字和下划线</div>
                <div class="error" id="usernameError"></div>
            </div>
            <div class="form-group">
                <label for="password">密码</label>
                <input type="password" id="password" name="password" placeholder="请输入密码">
                <div class="hint">6-20个字符，字母开头，包含大小写字母和数字</div>
                <div class="error" id="passwordError"></div>
            </div>
            <div class="form-group">
                <label for="confirmPassword">确认密码</label>
                <input type="password" id="confirmPassword" name="confirmPassword" placeholder="请再次输入密码">
                <div class="error" id="confirmPasswordError"></div>
            </div>
            <button type="submit" class="btn">注册</button>
            <div class="success" id="successMessage"></div>
        </form>
        <div class="login-link">
            已有账号？<a href="/login">立即登录</a>
        </div>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            document.querySelectorAll('.error').forEach(el => el.style.display = 'none');
            document.getElementById('successMessage').style.display = 'none';
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            let hasError = false;
            
            if (!username) {
                document.getElementById('usernameError').textContent = '用户名必填';
                document.getElementById('usernameError').style.display = 'block';
                hasError = true;
            } else if (username.length < 3 || username.length > 10) {
                document.getElementById('usernameError').textContent = '用户名长度必须为3-10个字符';
                document.getElementById('usernameError').style.display = 'block';
                hasError = true;
            } else if (!/^[a-zA-Z][a-zA-Z0-9_]*$/.test(username)) {
                document.getElementById('usernameError').textContent = '用户名必须以字母开头，且只能包含字母、数字和下划线';
                document.getElementById('usernameError').style.display = 'block';
                hasError = true;
            } else if (!/[a-zA-Z]/.test(username) || !/[0-9]/.test(username) || !/_/.test(username)) {
                document.getElementById('usernameError').textContent = '用户名必须同时包含字母、数字和下划线';
                document.getElementById('usernameError').style.display = 'block';
                hasError = true;
            }
            
            if (!password) {
                document.getElementById('passwordError').textContent = '密码必填';
                document.getElementById('passwordError').style.display = 'block';
                hasError = true;
            } else if (password.length < 6 || password.length > 20) {
                document.getElementById('passwordError').textContent = '密码长度必须为6-20个字符';
                document.getElementById('passwordError').style.display = 'block';
                hasError = true;
            } else if (!/^[a-zA-Z]/.test(password)) {
                document.getElementById('passwordError').textContent = '密码必须以字母开头';
                document.getElementById('passwordError').style.display = 'block';
                hasError = true;
            } else if (!/[A-Z]/.test(password) || !/[a-z]/.test(password) || !/[0-9]/.test(password)) {
                document.getElementById('passwordError').textContent = '密码必须包含大小写字母和数字';
                document.getElementById('passwordError').style.display = 'block';
                hasError = true;
            }
            
            if (password !== confirmPassword) {
                document.getElementById('confirmPasswordError').textContent = '两次密码输入不一致';
                document.getElementById('confirmPasswordError').style.display = 'block';
                hasError = true;
            }
            
            if (hasError) return;
            
            try {
                const response = await fetch('/api/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        username: username,
                        password: password,
                        confirm_password: confirmPassword
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    document.getElementById('successMessage').textContent = data.message + '，3秒后跳转到登录页面';
                    document.getElementById('successMessage').style.display = 'block';
                    setTimeout(() => {
                        window.location.href = '/login';
                    }, 3000);
                } else {
                    alert(data.message);
                }
            } catch (error) {
                alert('网络错误，请稍后重试');
            }
        });
    </script>
</body>
</html>
