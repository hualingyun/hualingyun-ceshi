<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>类别管理 - 博客系统</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>博客管理系统</h1>
            <nav class="nav">
                <a href="/">博客列表</a>
                <a href="/categories" class="active">类别管理</a>
            </nav>
        </header>

        <main class="main-content">
            <div class="action-bar">
                <button class="btn btn-primary" onclick="showAddModal()">添加类别</button>
            </div>

            <div class="table-container">
                <table class="blog-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>类别名称</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="categoryList">
                        <tr>
                            <td colspan="3" class="loading">加载中...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <!-- 添加/编辑模态框 -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">添加类别</h3>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body">
                <form id="categoryForm">
                    <div class="form-group">
                        <label for="categoryName" class="form-label">类别名称 <span class="required">*</span></label>
                        <input type="text" id="categoryName" name="name" class="form-input" placeholder="请输入类别名称" required>
                    </div>
                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary">保存</button>
                        <button type="button" class="btn btn-secondary" onclick="closeModal()">取消</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="/static/js/common.js"></script>
    <script>
        let currentEditId = null;

        // 加载类别列表
        async function loadCategories() {
            try {
                const categories = await api.get('/api/categories');
                const categoryList = document.getElementById('categoryList');
                
                if (categories.length === 0) {
                    categoryList.innerHTML = '<tr><td colspan="3" class="empty">暂无类别数据，点击上方"添加类别"按钮创建</td></tr>';
                    return;
                }

                categoryList.innerHTML = categories.map(category => `
                    <tr>
                        <td>${category.id}</td>
                        <td>${escapeHtml(category.name)}</td>
                        <td class="action-cell">
                            <button class="btn btn-sm btn-info" onclick="editCategory(${category.id}, '${escapeHtml(category.name)}')">编辑</button>
                            <button class="btn btn-sm btn-danger" onclick="deleteCategory(${category.id}, '${escapeHtml(category.name)}')">删除</button>
                        </td>
                    </tr>
                `).join('');
            } catch (error) {
                document.getElementById('categoryList').innerHTML = 
                    `<tr><td colspan="3" class="error">加载失败: ${error.message}</td></tr>`;
            }
        }

        // 显示添加模态框
        function showAddModal() {
            currentEditId = null;
            document.getElementById('modalTitle').textContent = '添加类别';
            document.getElementById('categoryForm').reset();
            document.getElementById('modal').style.display = 'flex';
        }

        // 编辑类别
        function editCategory(id, name) {
            currentEditId = id;
            document.getElementById('modalTitle').textContent = '编辑类别';
            document.getElementById('categoryName').value = name;
            document.getElementById('modal').style.display = 'flex';
        }

        // 关闭模态框
        function closeModal() {
            document.getElementById('modal').style.display = 'none';
            currentEditId = null;
        }

        // 表单提交
        async function handleSubmit(event) {
            event.preventDefault();

            const name = document.getElementById('categoryName').value.trim();

            if (!name) {
                showMessage('请输入类别名称', 'error');
                return;
            }

            try {
                if (currentEditId) {
                    // 编辑模式
                    await api.put(`/api/categories/${currentEditId}`, { name });
                    showMessage('更新成功', 'success');
                } else {
                    // 添加模式
                    await api.post('/api/categories', { name });
                    showMessage('添加成功', 'success');
                }

                closeModal();
                loadCategories();
            } catch (error) {
                showMessage(error.message, 'error');
            }
        }

        // 删除类别
        async function deleteCategory(id, name) {
            if (!confirm(`确定要删除类别"${name}"吗？\n注意：如果有博客使用该类别，则不能删除。`)) {
                return;
            }

            try {
                await api.delete(`/api/categories/${id}`);
                showMessage('删除成功', 'success');
                loadCategories();
            } catch (error) {
                showMessage(error.message, 'error');
            }
        }

        // 页面加载时执行
        document.addEventListener('DOMContentLoaded', function() {
            loadCategories();
            document.getElementById('categoryForm').addEventListener('submit', handleSubmit);

            // 点击模态框外部关闭
            document.getElementById('modal').addEventListener('click', function(event) {
                if (event.target === this) {
                    closeModal();
                }
            });
        });
    </script>
</body>
</html>
