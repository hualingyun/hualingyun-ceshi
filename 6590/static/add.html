<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>添加博客 - 博客系统</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>博客管理系统</h1>
            <nav class="nav">
                <a href="/">博客列表</a>
                <a href="/categories">类别管理</a>
            </nav>
        </header>

        <main class="main-content">
            <div class="page-header">
                <h2>添加博客</h2>
                <a href="/" class="btn btn-secondary">返回列表</a>
            </div>

            <div class="form-container">
                <form id="blogForm">
                    <div class="form-group">
                        <label for="title" class="form-label">博客主题 <span class="required">*</span></label>
                        <input type="text" id="title" name="title" class="form-input" placeholder="请输入博客主题" required>
                    </div>

                    <div class="form-group">
                        <label for="category_id" class="form-label">博客类别 <span class="required">*</span></label>
                        <select id="category_id" name="category_id" class="form-select" required>
                            <option value="">请选择博客类别</option>
                        </select>
                        <small class="form-hint">如果没有合适的类别，可以到<a href="/categories">类别管理</a>添加</small>
                    </div>

                    <div class="form-group">
                        <label for="content" class="form-label">博客内容 <span class="required">*</span></label>
                        <textarea id="content" name="content" class="form-textarea" rows="15" placeholder="请输入博客内容" required></textarea>
                    </div>

                    <div class="form-group">
                        <label class="form-label">其他设置</label>
                        <div class="checkbox-group">
                            <label class="checkbox-label">
                                <input type="checkbox" name="is_recommend" id="is_recommend">
                                <span>是否推荐</span>
                            </label>
                            <label class="checkbox-label">
                                <input type="checkbox" name="is_top" id="is_top">
                                <span>是否置顶</span>
                            </label>
                        </div>
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary">保存</button>
                        <button type="reset" class="btn btn-secondary">重置</button>
                    </div>
                </form>
            </div>
        </main>
    </div>

    <script src="/static/js/common.js"></script>
    <script>
        // 加载类别列表
        async function loadCategories() {
            try {
                const categories = await api.get('/api/categories');
                const select = document.getElementById('category_id');
                
                // 清空现有选项（保留默认选项）
                const defaultOption = select.options[0];
                select.innerHTML = '';
                select.appendChild(defaultOption);
                
                // 添加类别选项
                categories.forEach(category => {
                    const option = document.createElement('option');
                    option.value = category.id;
                    option.textContent = category.name;
                    select.appendChild(option);
                });
            } catch (error) {
                showMessage('加载类别失败: ' + error.message, 'error');
            }
        }

        // 表单提交
        async function handleSubmit(event) {
            event.preventDefault();

            const form = event.target;
            const formData = {
                title: form.title.value.trim(),
                category_id: parseInt(form.category_id.value),
                content: form.content.value.trim(),
                is_recommend: form.is_recommend.checked,
                is_top: form.is_top.checked
            };

            // 验证
            if (!formData.title) {
                showMessage('请输入博客主题', 'error');
                return;
            }

            if (!formData.category_id) {
                showMessage('请选择博客类别', 'error');
                return;
            }

            if (!formData.content) {
                showMessage('请输入博客内容', 'error');
                return;
            }

            try {
                await api.post('/api/blogs', formData);
                showMessage('添加成功', 'success');
                // 延迟跳转，让用户看到成功消息
                setTimeout(() => {
                    location.href = '/';
                }, 1000);
            } catch (error) {
                showMessage(error.message, 'error');
            }
        }

        // 页面加载时执行
        document.addEventListener('DOMContentLoaded', function() {
            loadCategories();
            document.getElementById('blogForm').addEventListener('submit', handleSubmit);
        });
    </script>
</body>
</html>
