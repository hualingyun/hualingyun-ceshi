<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>美食推荐分享网站</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .baidu-map-marker {
            background-color: #ff6b6b;
            color: white;
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
            white-space: nowrap;
            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="container">
            <div class="logo">
                <h1>美食推荐</h1>
            </div>
            <ul class="nav-links">
                <li><a href="#recommend" class="active">美食推荐</a></li>
                <li><a href="#map-section">美食地图</a></li>
                <li><a href="#topics">美食专题</a></li>
            </ul>
            <div class="mobile-menu-btn">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </nav>

    <!-- 横幅区域 -->
    <section class="banner">
        <div class="container">
            <h2>发现美食，享受生活</h2>
            <p>探索城市美食，分享美味时刻</p>
        </div>
    </section>

    <!-- 美食推荐模块 -->
    <section id="recommend" class="section">
        <div class="container">
            <h2 class="section-title">美食推荐</h2>
            
            <!-- 菜系分类标签 -->
            <div class="category-tabs">
                <button class="tab-btn active" data-category="all">全部</button>
                <button class="tab-btn" data-category="川菜">川菜</button>
                <button class="tab-btn" data-category="粤菜">粤菜</button>
                <button class="tab-btn" data-category="湘菜">湘菜</button>
                <button class="tab-btn" data-category="日料">日料</button>
                <button class="tab-btn" data-category="西餐">西餐</button>
            </div>

            <!-- 美食列表 -->
            <div class="food-list" id="foodList">
                <!-- 美食卡片将通过JavaScript动态生成 -->
            </div>
        </div>
    </section>

    <!-- 美食地图模块 -->
    <section id="map-section" class="section">
        <div class="container">
            <h2 class="section-title">美食地图</h2>
            <div class="map-container">
                <div id="leaflet-map" class="leaflet-map"></div>
                <div class="map-info">
                    <h3>店铺信息</h3>
                    <div id="shopInfo">
                        <p>点击地图上的标记查看店铺详情</p>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- 美食专题模块 -->
    <section id="topics" class="section">
        <div class="container">
            <h2 class="section-title">美食专题</h2>
            <div class="topics-list" id="topicsList">
                <!-- 专题卡片将通过JavaScript动态生成 -->
            </div>
        </div>
    </section>

    <!-- 页脚 -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 美食推荐分享网站. All rights reserved.</p>
        </div>
    </footer>

    <!-- 引入JavaScript -->
    <script>
        var BMap;
        var BMAP_ANCHOR_TOP_LEFT;
        var BMAP_STATUS_SUCCESS;
        
        window.baiduMapLoaded = false;
        
        function loadBaiduMap() {
            if (window.baiduMapLoaded) {
                initBaiduMap();
                return;
            }
            
            var AK = 'nSxiPohfziUaCuONe4ViUP2N';
            var script = document.createElement('script');
            script.src = 'https://api.map.baidu.com/api?v=3.0&ak=' + AK + '&callback=initBaiduMap';
            document.head.appendChild(script);
        }
        
        function initBaiduMap() {
            window.baiduMapLoaded = true;
            if (typeof initMap === 'function') {
                initMap();
            }
        }
    </script>
    <script src="js/app.js"></script>
</body>
</html>
